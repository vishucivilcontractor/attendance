<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Krishna Attendance Manager - Fixed</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    body {
      background: linear-gradient(145deg, #f0f4ff 0%, #e9eef9 100%);
      min-height: 100vh;
      transition: background 0.3s, color 0.2s;
    }
    body.dark {
      background: #121826;
      color: #eef2ff;
    }
    body.dark .glass-card,
    body.dark .calendar-container,
    body.dark .attendance-card,
    body.dark .form-card {
      background: rgba(30, 35, 48, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #eef2ff;
    }
    body.dark .dashboard-stat {
      background: rgba(18, 22, 32, 0.7);
    }
    body.dark input, body.dark select {
      background: #2d3348;
      border-color: #4a5568;
      color: white;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
      padding: 0.8rem 1.5rem;
    }
    .user-greeting h2 {
      font-weight: 700;
      background: linear-gradient(135deg, #1e2b6e, #3a5e9c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    body.dark .user-greeting h2 {
      background: linear-gradient(135deg, #aac8ff, #6c8fd1);
      -webkit-background-clip: text;
    }
    .dark-toggle {
      background: rgba(0,0,0,0.1);
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      border-radius: 3rem;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.dark .dark-toggle {
      background: rgba(255,255,255,0.1);
      color: #ffdd77;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }
    .dashboard-stat {
      background: white;
      border-radius: 1.8rem;
      padding: 1.2rem;
      text-align: center;
      box-shadow: 0 5px 12px rgba(0,0,0,0.05);
    }
    body.dark .dashboard-stat {
      background: #1e2538;
    }
    .stat-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #3b71ca;
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 800;
    }
    .stat-label {
      font-size: 0.85rem;
      opacity: 0.8;
    }
    .tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 0.7rem 1.2rem;
      font-weight: 600;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .tab-btn.active {
      background: #3b71ca;
      color: white;
      box-shadow: 0 4px 8px rgba(59,113,202,0.3);
    }
    .tab-content {
      display: none;
      animation: fadeIn 0.25s ease;
    }
    .tab-content.active {
      display: block;
    }
    .form-card {
      padding: 1.5rem;
      border-radius: 1.8rem;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 0.4rem;
    }
    input, select {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 1.2rem;
      border: 1px solid #ddd;
      background: rgba(255,255,255,0.8);
      font-size: 0.95rem;
    }
    .btn-primary {
      background: linear-gradient(95deg, #2c5fbf, #5a8dee);
      border: none;
      padding: 0.8rem 1.2rem;
      border-radius: 2rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .attendance-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 500px;
      overflow-y: auto;
    }
    .attendance-card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
    }
    .card-info {
      flex: 2;
    }
    .card-actions button {
      background: none;
      border: none;
      font-size: 1.2rem;
      margin: 0 5px;
      cursor: pointer;
    }
    .edit-btn { color: #2c7da0; }
    .delete-btn { color: #e06c6c; }
    .calendar-container {
      background: white;
      border-radius: 1.8rem;
      padding: 1rem;
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .calendar-header button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 2rem;
    }
    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      text-align: center;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .calendar-dates {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 5px;
    }
    .cal-day {
      background: #f0f2f5;
      border-radius: 2rem;
      padding: 0.7rem 0;
      text-align: center;
      cursor: pointer;
    }
    .cal-day.highlight {
      background: #3b71ca;
      color: white;
      font-weight: bold;
    }
    body.dark .cal-day {
      background: #262d3e;
    }
    .filter-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .filter-bar select, .filter-bar input {
      flex: 1;
      min-width: 120px;
    }
    .toast-message {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      max-width: 350px;
      background: #333;
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      z-index: 1000;
      animation: fadeUp 0.3s;
    }
    .error-toast {
      background: #e74c3c;
    }
    .success-toast {
      background: #27ae60;
    }
    .warning-toast {
      background: #f39c12;
    }
    .spinner {
      border: 3px solid rgba(0,0,0,0.1);
      border-top: 3px solid #3b71ca;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.6s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    @media (max-width: 640px) {
      .attendance-card { flex-direction: column; align-items: flex-start; }
      .stats-grid { grid-template-columns: 1fr; }
    }
    .rules-warning {
      background: #f39c12;
      color: #2c3e50;
      padding: 12px;
      border-radius: 1rem;
      margin-bottom: 1rem;
      text-align: center;
      font-weight: bold;
    }
    body.dark .rules-warning {
      background: #e67e22;
      color: #fff;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-card header">
    <div class="user-greeting">
      <h2><i class="fas fa-user-check"></i> Krishna Chaudhari</h2>
      <p style="font-size:0.8rem;">Attendance Manager</p>
    </div>
    <button class="dark-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
  </div>

  <!-- Rules Warning Banner -->
  <div id="rulesWarning" class="rules-warning" style="display:none;">
    <i class="fas fa-exclamation-triangle"></i> Firebase Rules Issue! Please check console or update rules to: { ".read": true, ".write": true }
  </div>

  <div class="stats-grid">
    <div class="dashboard-stat"><div class="stat-icon"><i class="fas fa-calendar-week"></i></div><div class="stat-number" id="totalWorkingDays">0</div><div class="stat-label">Working Days (This Month)</div></div>
    <div class="dashboard-stat"><div class="stat-icon"><i class="fas fa-hard-hat"></i></div><div class="stat-number" id="totalSites">0</div><div class="stat-label">Unique Sites</div></div>
    <div class="dashboard-stat"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-number" id="totalEntries">0</div><div class="stat-label">Total Entries</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dashboardTab"><i class="fas fa-chart-line"></i> Dashboard</button>
    <button class="tab-btn" data-tab="addTab"><i class="fas fa-plus-circle"></i> Add Attendance</button>
    <button class="tab-btn" data-tab="historyTab"><i class="fas fa-list-ul"></i> Monthly View</button>
    <button class="tab-btn" data-tab="calendarTab"><i class="fas fa-calendar-alt"></i> Calendar</button>
  </div>

  <div id="dashboardTab" class="tab-content active">
    <div class="glass-card form-card" style="text-align:center;">
      <i class="fas fa-chart-simple" style="font-size:2rem;"></i>
      <h3>Monthly Attendance Summary</h3>
      <div id="monthlySummaryChart" style="margin-top:1rem;">Loading...</div>
      <button id="exportPDFBtn" class="btn-primary" style="margin-top:1rem; background: linear-gradient(135deg,#e67e22,#f39c12);"><i class="fas fa-download"></i> Export PDF Report</button>
      <button id="backupJSONBtn" class="btn-primary" style="margin-top:0.5rem; background:#2c3e66;"><i class="fas fa-database"></i> Backup JSON</button>
    </div>
  </div>

  <div id="addTab" class="tab-content">
    <div class="glass-card form-card">
      <h3><i class="fas fa-pen-alt"></i> New Attendance Record</h3>
      <div class="form-group">
        <label><i class="fas fa-calendar"></i> Date</label>
        <input type="date" id="attendanceDate" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-map-marker-alt"></i> Site / Location <span style="color:red;">*</span></label>
        <input type="text" id="siteName" placeholder="e.g., Andheri Office, Malad Site" required>
      </div>
      <button id="saveAttendanceBtn" class="btn-primary"><i class="fas fa-save"></i> Save Attendance</button>
    </div>
  </div>

  <div id="historyTab" class="tab-content">
    <div class="glass-card" style="padding:1rem;">
      <div class="filter-bar">
        <select id="monthFilter"><option value="">All Months</option></select>
        <select id="yearFilter"><option value="">All Years</option></select>
        <input type="text" id="searchSite" placeholder="Search by site name...">
      </div>
      <div id="attendanceListContainer" class="attendance-list">Loading...</div>
    </div>
  </div>

  <div id="calendarTab" class="tab-content">
    <div class="calendar-container" id="calendarView"></div>
    <div id="selectedDateDetail" class="glass-card" style="margin-top:1rem; padding:1rem;"></div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getDatabase, ref, push, set, onValue, remove, update } from "firebase/database";

  const firebaseConfig = {
    apiKey: "AIzaSyAGiPKTZ3gCS7QMz7biu1T7i-Ix5ENOAv0",
    authDomain: "attendance-e0dd6.firebaseapp.com",
    projectId: "attendance-e0dd6",
    storageBucket: "attendance-e0dd6.firebasestorage.app",
    messagingSenderId: "656273149896",
    appId: "1:656273149896:web:06bf55cea01d1212dcfafd"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const attendanceRef = ref(db, 'attendance');

  let allAttendances = [];
  let currentEditId = null;
  let isSaving = false;

  const saveBtn = document.getElementById('saveAttendanceBtn');
  const dateInput = document.getElementById('attendanceDate');
  const siteNameInput = document.getElementById('siteName');

  dateInput.value = new Date().toISOString().split('T')[0];

  function showToast(msg, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    if (type === 'error') toast.classList.add('error-toast');
    else if (type === 'warning') toast.classList.add('warning-toast');
    else toast.classList.add('success-toast');
    toast.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : type === 'warning' ? 'exclamation-triangle' : 'check-circle'}"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  // Test Firebase connection and rules
  async function testFirebaseConnection() {
    try {
      const testRef = ref(db, 'test_connection');
      await set(testRef, { timestamp: Date.now() });
      await remove(testRef);
      console.log("✅ Firebase connection successful! Rules are working.");
      document.getElementById('rulesWarning').style.display = 'none';
      return true;
    } catch (error) {
      console.error("❌ Firebase Rules Error:", error);
      if (error.code === 'PERMISSION_DENIED') {
        document.getElementById('rulesWarning').style.display = 'block';
        showToast("⚠️ Firebase Rules: Permission Denied! Update rules to { '.read': true, '.write': true }", "warning");
      }
      return false;
    }
  }

  // Save to Firebase
  saveBtn.addEventListener('click', async () => {
    if (isSaving) {
      showToast("Please wait...", "warning");
      return;
    }
    
    const date = dateInput.value;
    const siteName = siteNameInput.value.trim();
    
    if (!date) {
      showToast("❌ Please select a date", "error");
      return;
    }
    if (!siteName) {
      showToast("❌ Please enter site/location name", "error");
      return;
    }
    
    isSaving = true;
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Saving to Firebase...';
    
    try {
      const attendanceData = {
        date: date,
        siteName: siteName,
        timestamp: Date.now()
      };
      
      if (currentEditId) {
        await update(ref(db, `attendance/${currentEditId}`), attendanceData);
        showToast("✅ Updated successfully in Firebase!");
        currentEditId = null;
      } else {
        const newRef = await push(attendanceRef, attendanceData);
        console.log("Saved with ID:", newRef.key);
        showToast("✅ Saved successfully in Firebase!");
      }
      
      dateInput.value = new Date().toISOString().split('T')[0];
      siteNameInput.value = "";
      
    } catch (error) {
      console.error("Firebase Save Error:", error);
      if (error.code === 'PERMISSION_DENIED') {
        showToast("❌ Permission Denied! Update Firebase Rules to allow write", "error");
        document.getElementById('rulesWarning').style.display = 'block';
      } else {
        showToast(`❌ ${error.message}`, "error");
      }
    } finally {
      isSaving = false;
      saveBtn.disabled = false;
      saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Attendance';
    }
  });

  // Real-time data fetch
  function fetchAttendances() {
    onValue(attendanceRef, (snapshot) => {
      const data = snapshot.val();
      allAttendances = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
      allAttendances.sort((a, b) => new Date(b.date) - new Date(a.date));
      updateDashboard();
      updateMonthlyView();
      renderCalendar();
      populateFilters();
      console.log("Data loaded:", allAttendances.length, "records");
      if (allAttendances.length === 0) {
        showToast("No records found. Add your first attendance!", "warning");
      }
    }, (error) => {
      console.error("Firebase read error:", error);
      if (error.code === 'PERMISSION_DENIED') {
        document.getElementById('rulesWarning').style.display = 'block';
        showToast("⚠️ Cannot read data! Update Firebase Rules", "error");
      }
    });
  }

  function updateDashboard() {
    const now = new Date();
    const currentMonth = now.getMonth();
    const currentYear = now.getFullYear();
    
    const monthEntries = allAttendances.filter(a => {
      const d = new Date(a.date);
      return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
    });
    
    const workingDays = new Set(monthEntries.map(a => a.date)).size;
    const uniqueSites = new Set(allAttendances.map(a => a.siteName)).size;
    
    document.getElementById('totalWorkingDays').innerText = workingDays;
    document.getElementById('totalSites').innerText = uniqueSites;
    document.getElementById('totalEntries').innerText = allAttendances.length;
    
    const monthMap = new Map();
    allAttendances.forEach(a => {
      const m = a.date.substring(0, 7);
      monthMap.set(m, (monthMap.get(m) || 0) + 1);
    });
    
    let html = '<div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">';
    for (let [m, c] of monthMap.entries()) {
      html += `<span style="background:linear-gradient(135deg,#3b71ca20,#5a8dee20); padding:6px 14px; border-radius:40px; font-weight:500;">${m}: ${c} days</span>`;
    }
    html += monthMap.size === 0 ? '<p>📭 No records yet. Add your first attendance!</p>' : '';
    html += '</div>';
    document.getElementById('monthlySummaryChart').innerHTML = html;
  }

  function updateMonthlyView() {
    const month = document.getElementById('monthFilter').value;
    const year = document.getElementById('yearFilter').value;
    const search = document.getElementById('searchSite')?.value.toLowerCase() || "";
    
    let filtered = [...allAttendances];
    if (month) filtered = filtered.filter(a => new Date(a.date).getMonth() + 1 == month);
    if (year) filtered = filtered.filter(a => new Date(a.date).getFullYear() == year);
    if (search) filtered = filtered.filter(a => a.siteName.toLowerCase().includes(search));
    
    const container = document.getElementById('attendanceListContainer');
    if (!filtered.length) {
      container.innerHTML = "<div class='glass-card' style='padding:1rem; text-align:center;'>📭 No attendance records found</div>";
      return;
    }
    
    container.innerHTML = filtered.map(att => `
      <div class="attendance-card">
        <div class="card-info">
          <strong><i class="fas fa-calendar-alt"></i> ${att.date}</strong><br/>
          <i class="fas fa-map-pin"></i> ${att.siteName}
        </div>
        <div class="card-actions">
          <button class="edit-btn" data-id="${att.id}"><i class="fas fa-edit"></i> Edit</button>
          <button class="delete-btn" data-id="${att.id}"><i class="fas fa-trash-alt"></i> Delete</button>
        </div>
      </div>
    `).join('');
    
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const att = allAttendances.find(a => a.id === btn.dataset.id);
        if (att) {
          dateInput.value = att.date;
          siteNameInput.value = att.siteName;
          currentEditId = att.id;
          showToast("✏️ Edit mode: Modify and Save");
          document.querySelector('[data-tab="addTab"]').click();
        }
      });
    });
    
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (confirm("Delete this record?")) {
          try {
            await remove(ref(db, `attendance/${btn.dataset.id}`));
            showToast("✅ Deleted from Firebase");
          } catch (error) {
            showToast("❌ Delete failed: " + error.message, "error");
          }
        }
      });
    });
  }

  function populateFilters() {
    const years = [...new Set(allAttendances.map(a => new Date(a.date).getFullYear()))].sort((a,b)=>b-a);
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const monthSel = document.getElementById('monthFilter');
    const yearSel = document.getElementById('yearFilter');
    
    monthSel.innerHTML = '<option value="">📅 All Months</option>' + months.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');
    yearSel.innerHTML = '<option value="">📆 All Years</option>' + years.map(y=>`<option value="${y}">${y}</option>`).join('');
    
    monthSel.onchange = () => updateMonthlyView();
    yearSel.onchange = () => updateMonthlyView();
    document.getElementById('searchSite').oninput = () => updateMonthlyView();
  }

  let currentCalendarYear = new Date().getFullYear();
  let currentCalendarMonth = new Date().getMonth();
  
  function renderCalendar() {
    const year = currentCalendarYear;
    const month = currentCalendarMonth;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    let dates = [];
    for (let i = 0; i < firstDay; i++) dates.push(null);
    for (let i = 1; i <= daysInMonth; i++) dates.push(i);
    
    const attendanceDates = new Set(allAttendances.map(a => a.date));
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    
    let html = `
      <div class="calendar-container">
        <div class="calendar-header">
          <button id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
          <h4>${monthNames[month]} ${year}</h4>
          <button id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="calendar-days">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div>${d}</div>`).join('')}</div>
        <div class="calendar-dates">
    `;
    
    dates.forEach(day => {
      if (day === null) {
        html += '<div></div>';
      } else {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const isHighlight = attendanceDates.has(dateStr);
        html += `<div class="cal-day ${isHighlight ? 'highlight' : ''}" data-date="${dateStr}">${day}</div>`;
      }
    });
    
    html += `</div></div>`;
    document.getElementById('calendarView').innerHTML = html;
    
    document.getElementById('prevMonthBtn')?.addEventListener('click', () => {
      currentCalendarMonth--;
      if (currentCalendarMonth < 0) { currentCalendarMonth = 11; currentCalendarYear--; }
      renderCalendar();
    });
    document.getElementById('nextMonthBtn')?.addEventListener('click', () => {
      currentCalendarMonth++;
      if (currentCalendarMonth > 11) { currentCalendarMonth = 0; currentCalendarYear++; }
      renderCalendar();
    });
    document.querySelectorAll('.cal-day[data-date]').forEach(el => {
      el.addEventListener('click', () => showDayDetails(el.dataset.date));
    });
  }
  
  function showDayDetails(dateStr) {
    const dayEntries = allAttendances.filter(a => a.date === dateStr);
    const detailDiv = document.getElementById('selectedDateDetail');
    if (dayEntries.length === 0) {
      detailDiv.innerHTML = `<strong>📅 ${dateStr}</strong><br/>📭 No attendance records`;
    } else {
      detailDiv.innerHTML = `<strong>📅 ${dateStr}</strong><br/><br/>${dayEntries.map(e => `<div><i class="fas fa-map-marker-alt"></i> ${e.siteName}</div>`).join('')}`;
    }
  }

  document.getElementById('exportPDFBtn').addEventListener('click', async () => {
    if (allAttendances.length === 0) { showToast("No data to export", "error"); return; }
    showToast("Generating PDF...");
    const element = document.createElement('div');
    element.style.padding = '20px';
    element.style.backgroundColor = 'white';
    element.style.color = 'black';
    element.innerHTML = `<h2>Krishna Chaudhari</h2><h3>Attendance Report</h3><p>Total: ${allAttendances.length} entries</p><table border="1"><tr><th>Date</th><th>Site</th></tr>${allAttendances.map(a => `<tr><td>${a.date}</td><td>${a.siteName}</td></tr>`).join('')}</table>`;
    document.body.appendChild(element);
    const canvas = await html2canvas(element);
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);
    pdf.save('attendance.pdf');
    document.body.removeChild(element);
    showToast("PDF downloaded!");
  });

  document.getElementById('backupJSONBtn').addEventListener('click', () => {
    const dataStr = JSON.stringify(allAttendances, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `attendance_backup_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Backup exported");
  });

  const darkToggle = document.getElementById('darkModeToggle');
  darkToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('darkMode', document.body.classList.contains('dark'));
  });
  if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });

  // Start app
  testFirebaseConnection();
  fetchAttendances();
</script>
</body>
</html>
